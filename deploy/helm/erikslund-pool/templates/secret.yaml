{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "erikslund-pool.secretName" . }}
  labels: {{- include "erikslund-pool.labels" . | nindent 4 }}
type: Opaque
stringData:
  # A Secret, not a ConfigMap, because it carries the bitcoind RPC password.
  pool.yml: |
    {{- toYaml .Values.config.settings | nindent 4 }}
{{- end }}
