apiVersion: v1
kind: Service
metadata:
  name: {{ include "erikslund-pool.fullname" . }}-api
  labels:
    {{- include "erikslund-pool.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # ClusterIP by default -- keep the unauthenticated status/metrics API in-cluster.
  type: {{ .Values.apiService.type }}
  selector: {{- include "erikslund-pool.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.apiService.port }}
      targetPort: api
      protocol: TCP
