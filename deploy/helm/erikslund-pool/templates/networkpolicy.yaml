{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "erikslund-pool.fullname" . }}
  labels: {{- include "erikslund-pool.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "erikslund-pool.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: stratum
          protocol: TCP
    - from:
        - podSelector: {}
        {{- range .Values.networkPolicy.apiAllowNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: api
          protocol: TCP
{{- end }}
