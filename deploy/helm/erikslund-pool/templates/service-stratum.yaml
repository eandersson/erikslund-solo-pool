apiVersion: v1
kind: Service
metadata:
  name: {{ include "erikslund-pool.fullname" . }}-stratum
  labels:
    {{- include "erikslund-pool.labels" . | nindent 4 }}
    app.kubernetes.io/component: stratum
  {{- with .Values.stratumService.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.stratumService.type }}
  {{- if and (eq .Values.stratumService.type "LoadBalancer") .Values.stratumService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.stratumService.loadBalancerIP }}
  {{- end }}
  {{- if ne .Values.stratumService.type "ClusterIP" }}
  # Local preserves the miner's source IP (per-IP stats); Cluster spreads evenly but SNATs.
  externalTrafficPolicy: {{ .Values.stratumService.externalTrafficPolicy }}
  {{- end }}
  {{- if eq .Values.stratumService.sessionAffinity "ClientIP" }}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.stratumService.sessionAffinityTimeoutSeconds }}
  {{- end }}
  selector: {{- include "erikslund-pool.selectorLabels" . | nindent 4 }}
  ports:
    - name: stratum
      port: {{ .Values.stratumService.port }}
      targetPort: stratum
      protocol: TCP
      {{- if and (eq .Values.stratumService.type "NodePort") .Values.stratumService.nodePort }}
      nodePort: {{ .Values.stratumService.nodePort }}
      {{- end }}
