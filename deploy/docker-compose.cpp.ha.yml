name: erikslund-pool-cpp-ha

services:
  setup:
    image: alpine:3.23
    restart: "no"
    network_mode: "none"
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    pids_limit: 64
    mem_limit: 64m
    volumes:
      - ./setup.sh:/setup.sh:ro
      - ./bitcoin.conf:/templates/bitcoin.conf:ro
      - ../conf/pool.yml:/templates/pool.yml:ro
      - config:/config
    command: ["sh", "/setup.sh"]

  bitcoind:
    build:
      context: ../tools/regtest
      dockerfile: Dockerfile.bitcoind
      args:
        BTC_VERSION: "31.0"
    image: erikslund-bitcoind:31.0
    restart: unless-stopped
    stop_grace_period: 120s
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    pids_limit: 256
    mem_limit: 4g
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - config:/etc/bitcoin:ro
      - bitcoin-data:/data
    ports:
      - "8333:8333"
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-conf=/etc/bitcoin/bitcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Two interchangeable backends; HAProxy fronts :3333. API published on loopback
  # (7778/7779) for inspection.
  pool1:
    build:
      context: ../cpp
      dockerfile: Dockerfile
    image: erikslund-pool-cpp-rt:latest
    # API on 0.0.0.0 so the HAProxy container can reach /health.
    command: ["--config", "/etc/erikslund-pool/pool.yml", "--api-host", "0.0.0.0"]
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    pids_limit: 256
    mem_limit: 512m
    depends_on:
      setup:
        condition: service_completed_successfully
      bitcoind:
        condition: service_healthy
    volumes:
      - config:/etc/erikslund-pool:ro
      - pool1-data:/var/lib/erikslund-pool
    ports:
      - "127.0.0.1:7778:7777"

  pool2:
    image: erikslund-pool-cpp-rt:latest
    command: ["--config", "/etc/erikslund-pool/pool.yml", "--api-host", "0.0.0.0"]
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/tmp"]
    pids_limit: 256
    mem_limit: 512m
    depends_on:
      setup:
        condition: service_completed_successfully
      bitcoind:
        condition: service_healthy
    volumes:
      - config:/etc/erikslund-pool:ro
      - pool2-data:/var/lib/erikslund-pool
    ports:
      - "127.0.0.1:7779:7777"

  haproxy:
    image: haproxy:lts-trixie
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    read_only: true
    tmpfs: ["/var/run:mode=1777"]
    pids_limit: 256
    mem_limit: 256m
    ulimits:
      nofile:
        soft: 400000             # >= 2x haproxy.cfg global maxconn
        hard: 400000
    depends_on:
      - pool1
      - pool2
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "3333:3333"              # miner-facing Stratum
      - "127.0.0.1:8404:8404"    # HAProxy stats UI

volumes:
  config:
  bitcoin-data:
  pool1-data:
  pool2-data:
