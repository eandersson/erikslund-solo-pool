# Bitcoin Core (mainnet) for the erikslund pool deployment stacks.
#
# The RPC is reachable ONLY inside the compose network -- it is NOT published to
# the host. Even so, CHANGE rpcpassword below before any real deployment, and
# match it in the pool config (C: deploy/erikslund-pool.json) or compose command
# (Python: docker-compose.python.yml).
#
# To use a different network, add ONE of testnet=1 / signet=1 / regtest=1, move
# the rpc*/zmq* lines under the matching [test]/[signet]/[regtest] section, and
# update the RPC port the pool connects to (mainnet 8332, testnet 18332,
# signet 38332, regtest 18443) in the pool config / compose command.

server=1
rpcuser=erikslund
rpcpassword=CHANGE_ME_before_deploying
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
# erikslund pool subscribes here for instant new-block notification (fastblock).
zmqpubhashblock=tcp://0.0.0.0:28332

# Mining-friendly: build fuller block templates.
blockmaxweight=3990000
blockreconstructionextratxn=1000
# Modest DB cache; raise on hosts with more RAM for a faster initial sync.
dbcache=1000
# Cap the daily upload used to serve historical blocks to peers (MiB/day) -- easy
# on limited home/Pi bandwidth; doesn't affect sync or serving recent blocks.
maxuploadtarget=1000

# Run a pruned node to save disk (min 550 MB; a pruned node still serves
# getblocktemplate). Uncomment and set your budget in MB:
# prune=20000
