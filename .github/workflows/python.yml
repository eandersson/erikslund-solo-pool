name: Python

on:
  push:
    branches: [main]
    paths: ['python/**', '.github/workflows/python.yml']
  pull_request:
    paths: ['python/**', '.github/workflows/python.yml']

concurrency:
  group: py-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests
        run: python -m unittest discover -t . -s erikslund_pool/tests -v
