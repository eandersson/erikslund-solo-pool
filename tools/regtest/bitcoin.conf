# Regtest bitcoind config for the erikslund-pool test harness.
# Regtest = a private chain you fully control; blocks are generated on demand,
# no download, difficulty ~1 so a CPU miner finds blocks instantly.
regtest=1
server=1
txindex=1
# Needed so the wallet can create fee-paying txns on regtest.
fallbackfee=0.0002

[regtest]
rpcuser=erikslund
rpcpassword=erikslundpass
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18443
# erikslund-pool subscribes here for instant new-block notification.
zmqpubhashblock=tcp://0.0.0.0:28332
